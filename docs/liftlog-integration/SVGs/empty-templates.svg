<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-labelledby="et-title">
  <title id="et-title">A stack of workout template cards with an empty slot ready for a new plan</title>
  <!-- backdrop -->
  <circle cx="200" cy="150" r="108" fill="var(--secondary, #DDE7EB)" opacity="0.45"/>
  <!-- dashed "create new" card behind -->
  <rect x="188" y="52" width="150" height="104" rx="14" fill="none" stroke="var(--muted-foreground, #64828F)" stroke-width="3" stroke-dasharray="9 7"/>
  <g stroke="var(--muted-foreground, #64828F)" stroke-width="4" stroke-linecap="round">
    <path d="M263 88 v32 M247 104 h32"/>
  </g>
  <!-- back card of the stack -->
  <rect x="62" y="102" width="196" height="138" rx="16" fill="var(--secondary, #DDE7EB)"/>
  <!-- front card -->
  <rect x="76" y="116" width="196" height="138" rx="16" fill="var(--card, #FFFFFF)" stroke="var(--border, #DDE7EB)" stroke-width="2"/>
  <!-- card header -->
  <rect x="96" y="136" width="86" height="12" rx="6" fill="var(--foreground, #1E2A32)" opacity="0.8"/>
  <rect x="96" y="156" width="120" height="8" rx="4" fill="var(--muted-foreground, #64828F)" opacity="0.5"/>
  <!-- set chips: 5 x 5 -->
  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle">
    <circle cx="108" cy="192" r="13" fill="var(--primary, #2E837B)"/>
    <text x="108" y="196" fill="#FFFFFF">5</text>
    <circle cx="140" cy="192" r="13" fill="var(--primary, #2E837B)"/>
    <text x="140" y="196" fill="#FFFFFF">5</text>
    <circle cx="172" cy="192" r="13" fill="var(--primary, #2E837B)"/>
    <text x="172" y="196" fill="#FFFFFF">5</text>
    <circle cx="204" cy="192" r="13" fill="none" stroke="var(--muted-foreground, #64828F)" stroke-width="2" stroke-dasharray="4 3"/>
    <circle cx="236" cy="192" r="13" fill="none" stroke="var(--muted-foreground, #64828F)" stroke-width="2" stroke-dasharray="4 3"/>
  </g>
  <!-- progression chip -->
  <rect x="96" y="216" width="74" height="20" rx="10" fill="#E8B849" opacity="0.9"/>
  <text x="133" y="230" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#1E2A32">+2.5 kg</text>
  <!-- star badge -->
  <circle cx="272" cy="118" r="16" fill="#E8B849"/>
  <path d="M272 109 l2.6 5.6 6.2 0.7 -4.6 4.2 1.2 6.1 -5.4 -3 -5.4 3 1.2 -6.1 -4.6 -4.2 6.2 -0.7 z" fill="#1E2A32"/>
  <!-- sparkles -->
  <circle cx="330" cy="196" r="3" fill="var(--primary, #2E837B)" opacity="0.5"/>
  <circle cx="58" cy="80" r="3.5" fill="#D4654A" opacity="0.6"/>
</svg>
