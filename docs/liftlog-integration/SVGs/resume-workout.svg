<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-labelledby="rw-title">
  <title id="rw-title">A workout draft card on pause with a progress bar half full, ready to resume</title>
  <circle cx="200" cy="150" r="105" fill="var(--secondary, #DDE7EB)" opacity="0.45"/>
  <!-- draft card -->
  <rect x="92" y="74" width="216" height="152" rx="18" fill="var(--card, #FFFFFF)" stroke="var(--border, #DDE7EB)" stroke-width="2"/>
  <rect x="114" y="98" width="104" height="12" rx="6" fill="var(--foreground, #1E2A32)" opacity="0.8"/>
  <rect x="114" y="118" width="66" height="8" rx="4" fill="var(--muted-foreground, #64828F)" opacity="0.5"/>
  <!-- set rows: done, done, current, pending -->
  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle">
    <circle cx="126" cy="152" r="11" fill="var(--primary, #2E837B)"/>
    <path d="M121 152 l3.5 3.5 6 -7" stroke="#FFFFFF" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="154" cy="152" r="11" fill="var(--primary, #2E837B)"/>
    <path d="M149 152 l3.5 3.5 6 -7" stroke="#FFFFFF" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="182" cy="152" r="11" fill="#E8B849"/>
    <text x="182" y="156" fill="#1E2A32">8</text>
    <circle cx="210" cy="152" r="11" fill="none" stroke="var(--muted-foreground, #64828F)" stroke-width="2" stroke-dasharray="4 3"/>
  </g>
  <!-- progress bar -->
  <rect x="114" y="182" width="172" height="12" rx="6" fill="var(--secondary, #DDE7EB)"/>
  <rect x="114" y="182" width="94" height="12" rx="6" fill="var(--primary, #2E837B)"/>
  <text x="114" y="212" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="600" fill="var(--muted-foreground, #64828F)">Saved 2 min ago</text>
  <!-- pause badge -->
  <g>
    <circle cx="308" cy="86" r="26" fill="#D4654A"/>
    <rect x="299" y="76" width="6.5" height="20" rx="3" fill="#FFFFFF"/>
    <rect x="311" y="76" width="6.5" height="20" rx="3" fill="#FFFFFF"/>
  </g>
  <!-- steaming mug: the lifter stepped away -->
  <g>
    <rect x="60" y="196" width="34" height="28" rx="6" fill="#E8B849"/>
    <path d="M94 202 h8 a8 8 0 0 1 0 16 h-8" fill="none" stroke="#E8B849" stroke-width="5"/>
    <path d="M70 188 q3 -6 0 -12 M82 188 q3 -6 0 -12" fill="none" stroke="var(--muted-foreground, #64828F)" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  </g>
  <circle cx="336" cy="196" r="3" fill="var(--primary, #2E837B)" opacity="0.5"/>
</svg>
