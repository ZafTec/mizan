<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" role="img" aria-labelledby="igst-title">
  <title id="igst-title">Instagram story: Your gym log just got serious. Feature list and call to action.</title>
  <defs>
    <linearGradient id="igst-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#151D23"/>
      <stop offset="0.55" stop-color="#1E2A32"/>
      <stop offset="1" stop-color="#163B37"/>
    </linearGradient>
    <linearGradient id="igst-teal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4DCFC4"/>
      <stop offset="1" stop-color="#2E837B"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1920" fill="url(#igst-bg)"/>
  <!-- brand top -->
  <g transform="translate(540 150)">
    <circle cx="-90" cy="-12" r="28" fill="url(#igst-teal)"/>
    <path d="M-103 -12h26M-100 -21v18M-77 -21v18" stroke="#151D23" stroke-width="5" stroke-linecap="round"/>
    <text x="-48" y="0" font-family="ui-sans-serif, system-ui, 'Segoe UI', sans-serif" font-size="40" font-weight="800" fill="#F0F4F6" letter-spacing="2">MIZAN</text>
  </g>
  <!-- headline -->
  <text x="540" y="360" text-anchor="middle" font-family="ui-sans-serif, system-ui, 'Segoe UI', sans-serif" font-size="82" font-weight="900" fill="#F0F4F6">Your gym log</text>
  <text x="540" y="452" text-anchor="middle" font-family="ui-sans-serif, system-ui, 'Segoe UI', sans-serif" font-size="82" font-weight="900" fill="#4DCFC4">just got serious.</text>
  <!-- barbell divider -->
  <g transform="translate(540 560)">
    <rect x="-220" y="-8" width="440" height="16" rx="8" fill="#64828F"/>
    <rect x="-190" y="-38" width="26" height="76" rx="10" fill="#4DCFC4"/>
    <rect x="164" y="-38" width="26" height="76" rx="10" fill="#4DCFC4"/>
    <rect x="-224" y="-28" width="18" height="56" rx="8" fill="#E8B849"/>
    <rect x="206" y="-28" width="18" height="56" rx="8" fill="#E8B849"/>
  </g>
  <!-- feature rows -->
  <g font-family="ui-sans-serif, system-ui, 'Segoe UI', sans-serif" font-size="40" font-weight="700" fill="#F0F4F6">
    <g transform="translate(150 720)">
      <circle cx="26" cy="-14" r="26" fill="#2E837B"/>
      <path d="M14 -14l8 8 16-18" stroke="#FFFFFF" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="84" y="0">Proven templates, 5x5 and PPL</text>
    </g>
    <g transform="translate(150 850)">
      <circle cx="26" cy="-14" r="26" fill="#2E837B"/>
      <path d="M14 -14l8 8 16-18" stroke="#FFFFFF" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="84" y="0">Tap to log every set</text>
    </g>
    <g transform="translate(150 980)">
      <circle cx="26" cy="-14" r="26" fill="#2E837B"/>
      <path d="M14 -14l8 8 16-18" stroke="#FFFFFF" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="84" y="0">Auto progression, +2.5 kg</text>
    </g>
    <g transform="translate(150 1110)">
      <circle cx="26" cy="-14" r="26" fill="#2E837B"/>
      <path d="M14 -14l8 8 16-18" stroke="#FFFFFF" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="84" y="0">PRs, streaks, achievements</text>
    </g>
    <g transform="translate(150 1240)">
      <circle cx="26" cy="-14" r="26" fill="#2E837B"/>
      <path d="M14 -14l8 8 16-18" stroke="#FFFFFF" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="84" y="0">A private feed for your crew</text>
    </g>
  </g>
  <!-- flame mascot -->
  <g transform="translate(830 1360)">
    <path d="M0 -60c8 30 42 46 42 88a42 42 0 0 1-84 0c0-24 14-33 21-52 7 9 12 17 12 26 9-16 10-42 9-62z" fill="#D4654A"/>
    <path d="M0 6c5 16 22 24 22 44a22 22 0 0 1-44 0c0-12 8-18 11-27 4 5 7 9 7 14 5-9 5-21 4-31z" fill="#E8B849"/>
    <circle cx="-8" cy="42" r="3.4" fill="#1E2A32"/>
    <circle cx="8" cy="42" r="3.4" fill="#1E2A32"/>
    <path d="M-8 54q8 7 16 0" stroke="#1E2A32" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>
  <!-- CTA -->
  <rect x="240" y="1580" width="600" height="110" rx="55" fill="url(#igst-teal)"/>
  <text x="540" y="1650" text-anchor="middle" font-family="ui-sans-serif, system-ui, 'Segoe UI', sans-serif" font-size="44" font-weight="800" fill="#0F171C">Start your first workout</text>
  <text x="540" y="1790" text-anchor="middle" font-family="ui-sans-serif, system-ui, 'Segoe UI', sans-serif" font-size="34" font-weight="600" fill="#9FB8C2">mizan.euaell.me</text>
  <!-- confetti -->
  <rect x="180" y="260" width="24" height="24" rx="6" fill="#D4654A" transform="rotate(20 192 272)"/>
  <rect x="880" y="300" width="22" height="22" rx="5" fill="#E8B849" transform="rotate(-24 891 311)"/>
  <circle cx="140" cy="1500" r="10" fill="#4DCFC4"/>
  <path d="M900 640l8 18 18 8-18 8-8 18-8-18-18-8 18-8z" fill="#E8B849"/>
</svg>
