<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="og-title">
  <title id="og-title">Mizan workout launch card: Workouts, rebuilt. Templates, per-set logging, PRs, and a feed for your lifts.</title>
  <defs>
    <linearGradient id="og-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1E2A32"/>
      <stop offset="1" stop-color="#151D23"/>
    </linearGradient>
    <linearGradient id="og-teal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4DCFC4"/>
      <stop offset="1" stop-color="#2E837B"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#og-bg)"/>
  <!-- subtle grid -->
  <g stroke="#3E5560" stroke-width="1" opacity="0.25">
    <path d="M0 158h1200M0 316h1200M0 474h1200"/>
    <path d="M300 0v630M600 0v630M900 0v630"/>
  </g>
  <!-- brand -->
  <g>
    <circle cx="96" cy="92" r="26" fill="url(#og-teal)"/>
    <path d="M84 92h24M87 84v16M111 84v16" stroke="#151D23" stroke-width="5" stroke-linecap="round"/>
    <text x="140" y="102" font-family="ui-sans-serif, system-ui, 'Segoe UI', sans-serif" font-size="30" font-weight="800" fill="#F0F4F6" letter-spacing="1">MIZAN</text>
  </g>
  <!-- headline -->
  <text x="88" y="266" font-family="ui-sans-serif, system-ui, 'Segoe UI', sans-serif" font-size="86" font-weight="900" fill="#F0F4F6">Workouts,</text>
  <text x="88" y="360" font-family="ui-sans-serif, system-ui, 'Segoe UI', sans-serif" font-size="86" font-weight="900" fill="#4DCFC4">rebuilt.</text>
  <!-- subline chips -->
  <g font-family="ui-sans-serif, system-ui, 'Segoe UI', sans-serif" font-size="24" font-weight="700">
    <rect x="88" y="412" width="176" height="52" rx="26" fill="#243440"/>
    <text x="176" y="446" text-anchor="middle" fill="#8FE0D8">Templates</text>
    <rect x="280" y="412" width="230" height="52" rx="26" fill="#243440"/>
    <text x="395" y="446" text-anchor="middle" fill="#8FE0D8">Per-set logging</text>
    <rect x="526" y="412" width="110" height="52" rx="26" fill="#E8B849"/>
    <text x="581" y="446" text-anchor="middle" fill="#151D23">PRs</text>
    <rect x="88" y="480" width="286" height="52" rx="26" fill="#243440"/>
    <text x="231" y="514" text-anchor="middle" fill="#8FE0D8">A feed for your lifts</text>
  </g>
  <!-- barbell illustration -->
  <g transform="translate(760 96)">
    <rect x="0" y="150" width="360" height="18" rx="9" fill="#64828F"/>
    <rect x="52" y="96" width="34" height="126" rx="13" fill="url(#og-teal)"/>
    <rect x="24" y="116" width="24" height="86" rx="10" fill="#E8B849"/>
    <rect x="274" y="96" width="34" height="126" rx="13" fill="url(#og-teal)"/>
    <rect x="312" y="116" width="24" height="86" rx="10" fill="#E8B849"/>
    <rect x="96" y="142" width="12" height="34" rx="5" fill="#9FB8C2"/>
    <rect x="252" y="142" width="12" height="34" rx="5" fill="#9FB8C2"/>
    <!-- rising line over the bar -->
    <path d="M30 70 C 110 58, 200 20, 330 -24" fill="none" stroke="#4DCFC4" stroke-width="8" stroke-linecap="round" stroke-dasharray="2 20"/>
    <path d="M330 -24l-30 4M330 -24l-9 28" stroke="#4DCFC4" stroke-width="8" stroke-linecap="round" fill="none"/>
    <!-- confetti -->
    <rect x="150" y="30" width="16" height="16" rx="3" fill="#D4654A" transform="rotate(24 158 38)"/>
    <rect x="240" y="64" width="14" height="14" rx="3" fill="#E8B849" transform="rotate(-18 247 71)"/>
    <circle cx="90" cy="36" r="7" fill="#E8B849"/>
    <path d="M212 -10l5 12 12 5-12 5-5 12-5-12-12-5 12-5z" fill="#F0F4F6" opacity="0.9"/>
  </g>
  <!-- footer -->
  <text x="1112" y="580" text-anchor="end" font-family="ui-sans-serif, system-ui, 'Segoe UI', sans-serif" font-size="24" font-weight="600" fill="#9FB8C2">mizan.euaell.me</text>
</svg>
