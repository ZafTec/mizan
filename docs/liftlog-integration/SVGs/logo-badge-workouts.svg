  <g>
    <path d="M256 118c-16 0-29 8-35 20a34 34 0 0 0-46 32c0 14 8 26 20 31v17h122v-17c12-5 20-17 20-31a34 34 0 0 0-46-32c-6-12-19-20-35-20z" fill="#F0F4F6"/>
    <rect x="195" y="218" width="122" height="18" rx="8" fill="#DDE7EB"/>
    <path d="M226 168v46M256 172v42M286 168v46" stroke="#C9D6DC" stroke-width="7" stroke-linecap="round"/>
  </g>
  <!-- barbell -->
  <g>
    <rect x="96" y="300" width="320" height="26" rx="13" fill="#64828F"/>
    <rect x="150" y="252" width="42" height="122" rx="16" fill="url(#lbw-teal)"/>
    <rect x="116" y="270" width="28" height="86" rx="12" fill="#E8B849"/>
    <rect x="320" y="252" width="42" height="122" rx="16" fill="url(#lbw-teal)"/>
    <rect x="368" y="270" width="28" height="86" rx="12" fill="#E8B849"/>
    <rect x="204" y="292" width="14" height="42" rx="6" fill="#9FB8C2"/>
    <rect x="294" y="292" width="14" height="42" rx="6" fill="#9FB8C2"/>
  </g>
  <!-- happy face on the bar center -->
