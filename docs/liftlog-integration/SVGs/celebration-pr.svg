<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-labelledby="cpr-title">
  <title id="cpr-title">A golden trophy with a barbell emblem surrounded by confetti, a new personal record</title>
  <style>
    .cpr-rays { transform-box: fill-box; transform-origin: center; animation: cpr-pulse 1.8s ease-in-out infinite; }
    .cpr-confetti { animation: cpr-drift 2.6s ease-in-out infinite; }
    .cpr-trophy { transform-box: fill-box; transform-origin: 50% 100%; animation: cpr-bounce 2.6s ease-in-out infinite; }
    @keyframes cpr-pulse { 0%,100% { opacity: .55; transform: scale(1); } 50% { opacity: .9; transform: scale(1.05); } }
    @keyframes cpr-drift { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
    @keyframes cpr-bounce { 0%,20%,100% { transform: scaleY(1); } 8% { transform: scaleY(0.96); } 14% { transform: scaleY(1.02); } }
    @media (prefers-reduced-motion: reduce) { .cpr-rays, .cpr-confetti, .cpr-trophy { animation: none; } }
  </style>
  <!-- rays -->
  <g class="cpr-rays" stroke="#E8B849" stroke-width="5" stroke-linecap="round" opacity="0.55">
    <line x1="200" y1="34" x2="200" y2="52"/>
    <line x1="132" y1="56" x2="142" y2="70"/>
    <line x1="268" y1="56" x2="258" y2="70"/>
    <line x1="104" y1="120" x2="120" y2="124"/>
    <line x1="296" y1="120" x2="280" y2="124"/>
  </g>
  <!-- confetti -->
  <g class="cpr-confetti">
    <rect x="84" y="64" width="10" height="10" rx="2" fill="#D4654A" transform="rotate(24 89 69)"/>
    <rect x="310" y="78" width="10" height="10" rx="2" fill="var(--primary, #2E837B)" transform="rotate(-18 315 83)"/>
    <rect x="70" y="170" width="9" height="9" rx="2" fill="#E8B849" transform="rotate(40 74 174)"/>
    <rect x="322" y="168" width="9" height="9" rx="2" fill="#D4654A" transform="rotate(-30 326 172)"/>
    <circle cx="118" cy="220" r="4" fill="var(--primary, #2E837B)"/>
    <circle cx="288" cy="224" r="4" fill="#E8B849"/>
    <path d="M96 118 l3 7 7 3 -7 3 -3 7 -3 -7 -7 -3 7 -3 z" fill="var(--primary, #2E837B)" opacity="0.8"/>
    <path d="M306 130 l3 7 7 3 -7 3 -3 7 -3 -7 -7 -3 7 -3 z" fill="#D4654A" opacity="0.8"/>
  </g>
  <!-- trophy -->
  <g class="cpr-trophy">
    <path d="M156 64 h88 v44 a44 44 0 0 1 -88 0 z" fill="#E8B849"/>
    <path d="M156 72 h-20 a4 4 0 0 0 -4 4 c0 22 12 34 28 37" fill="none" stroke="#C09539" stroke-width="8" stroke-linecap="round"/>
    <path d="M244 72 h20 a4 4 0 0 1 4 4 c0 22 -12 34 -28 37" fill="none" stroke="#C09539" stroke-width="8" stroke-linecap="round"/>
    <path d="M164 70 c0 26 6 44 14 52" fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" opacity="0.45"/>
    <rect x="192" y="148" width="16" height="26" fill="#C09539"/>
    <rect x="168" y="174" width="64" height="14" rx="5" fill="#C09539"/>
    <rect x="156" y="188" width="88" height="16" rx="6" fill="var(--foreground, #1E2A32)"/>
    <!-- barbell emblem -->
    <g>
      <rect x="172" y="94" width="56" height="6" rx="3" fill="#1E2A32"/>
      <rect x="176" y="86" width="8" height="22" rx="3" fill="#1E2A32"/>
      <rect x="216" y="86" width="8" height="22" rx="3" fill="#1E2A32"/>
    </g>
  </g>
  <!-- PR ribbon -->
  <rect x="146" y="222" width="108" height="34" rx="17" fill="#D4654A"/>
  <text x="200" y="245" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="800" text-anchor="middle" fill="#FFFFFF" letter-spacing="2">NEW PR</text>
</svg>
