
# Development Docker Compose for Mizan Platform
# Usage: docker-compose up

services:
  # PostgreSQL Database
  postgres:
    image: postgres:18-alpine
    container_name: mizan-postgres
    environment:
      POSTGRES_DB: mizan
      POSTGRES_USER: mizan
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U mizan -d mizan" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mizan-network

  # Redis for SignalR backplane and caching
  redis:
    image: redis:7-alpine
    container_name: mizan-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:?REDIS_PASSWORD is required} ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mizan-network

  # Next.js Frontend with Bun (Development with hot reload)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mizan-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      # Database (for BetterAuth)
      - DATABASE_URL=postgres://mizan:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/mizan

      # BetterAuth config
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      - BETTER_AUTH_URL=${PUBLIC_APP_URL:-http://localhost:3000}
      - BETTER_AUTH_ISSUER=${PUBLIC_APP_URL:-http://localhost:3000}
      - BETTER_AUTH_AUDIENCE=mizan-api

      # Backend API (internal network - server-side)
      - API_URL=${SERVER_API_URL:-http://backend:8080}

      # Public URLs
      - NEXT_PUBLIC_APP_URL=${PUBLIC_APP_URL:-http://localhost:3000}
      - NEXT_PUBLIC_API_URL=${PUBLIC_API_URL:-http://localhost:5000}
      - ALLOWED_DEV_ORIGINS=${ALLOWED_DEV_ORIGINS:-}

      # External services
      - NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME=${NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME}
      - NEXT_PUBLIC_CLOUDINARY_API_KEY=${NEXT_PUBLIC_CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
      # Paddle (sandbox)
      - NEXT_PUBLIC_PADDLE_ENV=${NEXT_PUBLIC_PADDLE_ENV:-sandbox}
      - NEXT_PUBLIC_PADDLE_CLIENT_TOKEN=${NEXT_PUBLIC_PADDLE_CLIENT_TOKEN:-}
      - NEXT_PUBLIC_PADDLE_PRICE_PRO_MONTHLY=${NEXT_PUBLIC_PADDLE_PRICE_PRO_MONTHLY:-}
      - NEXT_PUBLIC_PADDLE_PRICE_PRO_YEARLY=${NEXT_PUBLIC_PADDLE_PRICE_PRO_YEARLY:-}
      - NEXT_PUBLIC_PADDLE_PRICE_LIFETIME=${NEXT_PUBLIC_PADDLE_PRICE_LIFETIME:-}
      # OpenTelemetry (optional, no-op if endpoints not set)
      - OTLP_ENDPOINT_URL=${OTLP_ENDPOINT_URL:-}
      - LOKI_OTLP_ENDPOINT=${LOKI_OTLP_ENDPOINT:-}
      - OTEL_METRICS_PORT=9464
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - mizan-network

  # .NET Backend API (JWT protected)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mizan-backend
    # Exposed on 5000 for local development
    ports:
      - "5000:8080"
    volumes:
      - ./backend:/src
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080

      # Database
      - ConnectionStrings__PostgreSQL=Host=postgres;Database=mizan;Username=mizan;Password=${DB_PASSWORD:?DB_PASSWORD is required}

      # Redis
      - ConnectionStrings__Redis=redis:6379,password=${REDIS_PASSWORD:?REDIS_PASSWORD is required}

      # JWT/JWKS Authentication
      - Jwt__Issuer=${PUBLIC_APP_URL:-http://localhost:3000}
      - Jwt__Audience=mizan-api
      - Jwt__JwksUrl=http://frontend:3000/api/auth/jwks
      - Cors__Origins__0=http://frontend:3000
      - Cors__Origins__1=http://localhost:3000
      - Cors__Origins__2=${PUBLIC_APP_URL:-http://localhost:3000}
      - OpenAI__ApiKey=${OPENAI_API_KEY:-}
      # MCP service-to-service API keys
      - Mcp__ServiceApiKey=${MCP_SERVICE_KEY:?MCP_SERVICE_KEY is required}
      - Mcp__AdminServiceApiKey=${MCP_ADMIN_SERVICE_KEY:?MCP_ADMIN_SERVICE_KEY is required}
      # OpenTelemetry (optional, no-op if endpoints not set)
      - OTLP_ENDPOINT_URL=${OTLP_ENDPOINT_URL:-}
      - LOKI_OTLP_ENDPOINT=${LOKI_OTLP_ENDPOINT:-}
      # Paddle (sandbox)
      - Paddle__Environment=${PADDLE_ENVIRONMENT:-sandbox}
      - Paddle__ApiKey=${PADDLE_API_KEY:-}
      - Paddle__WebhookSecret=${PADDLE_WEBHOOK_SECRET:-}
      - Paddle__GraceDays=${PADDLE_GRACE_DAYS:-3}
      - Paddle__LifetimePriceId=${NEXT_PUBLIC_PADDLE_PRICE_LIFETIME:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mizan-network

  # MCP Server (Model Context Protocol over SSE)
  mcp:
    build:
      context: ./backend
      dockerfile: Dockerfile.mcp
    container_name: mizan-mcp
    ports:
      - "5001:5001"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5001
      - ConnectionStrings__PostgreSQL=Host=postgres;Database=mizan;Username=mizan;Password=${DB_PASSWORD:?DB_PASSWORD is required}
      # Backend API connection (internal network)
      - BACKEND_API_URL=http://backend:8080
      # Service API keys for backend authentication
      - Mcp__ServiceApiKey=${MCP_SERVICE_KEY:?MCP_SERVICE_KEY is required}
      - Mcp__AdminServiceApiKey=${MCP_ADMIN_SERVICE_KEY:?MCP_ADMIN_SERVICE_KEY is required}
      # OpenTelemetry (optional, no-op if endpoints not set)
      - OTLP_ENDPOINT_URL=${OTLP_ENDPOINT_URL:-}
      - LOKI_OTLP_ENDPOINT=${LOKI_OTLP_ENDPOINT:-}
    volumes:
      - ./backend/Mizan.Mcp.Server/logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - mizan-network

  # Test runner service
  test:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mizan-test
    volumes:
      - ./backend:/src
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__PostgreSQL=Host=postgres;Database=mizan_test;Username=mizan;Password=${DB_PASSWORD:?DB_PASSWORD is required}
      - ConnectionStrings__Redis=redis:6379,password=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - Jwt__Issuer=http://localhost:3000
      - Jwt__Audience=mizan-api
      - Jwt__JwksUrl=http://frontend:3000/api/auth/jwks
    command: dotnet test --logger "console;verbosity=normal"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mizan-network
    profiles:
      - test

networks:
  mizan-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
