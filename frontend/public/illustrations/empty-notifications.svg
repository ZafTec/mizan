<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-labelledby="en-title">
  <title id="en-title">A bell sleeping under a crescent moon, no notifications yet</title>
  <style>
    .en-bell { transform-box: fill-box; transform-origin: 50% 12%; animation: en-sway 4.5s ease-in-out infinite; }
    .en-zzz text { animation: en-float 3s ease-in-out infinite; }
    .en-zzz text:nth-child(2) { animation-delay: .4s; }
    .en-zzz text:nth-child(3) { animation-delay: .8s; }
    @keyframes en-sway { 0%,100% { transform: rotate(0deg); } 30% { transform: rotate(1.6deg); } 70% { transform: rotate(-1.6deg); } }
    @keyframes en-float { 0%,100% { transform: translateY(0); opacity: 1; } 50% { transform: translateY(-6px); opacity: .55; } }
    @media (prefers-reduced-motion: reduce) { .en-bell, .en-zzz text { animation: none; } }
  </style>
  <circle cx="200" cy="150" r="105" fill="var(--secondary, #DDE7EB)" opacity="0.45"/>
  <!-- moon -->
  <path d="M312 70 a26 26 0 1 0 10 40 a20 20 0 0 1 -10 -40 z" fill="#E8B849"/>
  <!-- bell body -->
  <g class="en-bell">
  <path d="M200 78 a12 12 0 0 1 12 12 v4 c22 8 32 28 32 52 l6 18 a6 6 0 0 1 -6 8 H156 a6 6 0 0 1 -6 -8 l6 -18 c0 -24 10 -44 32 -52 v-4 a12 12 0 0 1 12 -12 z" fill="var(--primary, #2E837B)"/>
  <!-- bell highlight -->
  <path d="M172 138 c2 -18 10 -30 22 -36" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" opacity="0.35"/>
  <!-- clapper -->
  <circle cx="200" cy="188" r="10" fill="#E8B849"/>
  <!-- sleeping face -->
  <g stroke="#FFFFFF" stroke-width="2.6" stroke-linecap="round" fill="none">
    <path d="M186 130 q3.5 3.5 7 0"/>
    <path d="M207 130 q3.5 3.5 7 0"/>
    <path d="M196 144 q4 3 8 0"/>
  </g>
  </g>
  <!-- zzz -->
  <g class="en-zzz" fill="var(--muted-foreground, #64828F)" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="700">
    <text x="244" y="96" font-size="18">z</text>
    <text x="258" y="80" font-size="14">z</text>
    <text x="269" y="67" font-size="11">z</text>
  </g>
  <!-- floor + sparkles -->
  <ellipse cx="200" cy="212" rx="86" ry="8" fill="var(--secondary, #DDE7EB)"/>
  <circle cx="98" cy="98" r="3.5" fill="#D4654A" opacity="0.6"/>
  <path d="M90 176 l3 7 7 3 -7 3 -3 7 -3 -7 -7 -3 7 -3 z" fill="#E8B849" opacity="0.85"/>
</svg>
