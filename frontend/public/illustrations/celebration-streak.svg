<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-labelledby="cs-title">
  <title id="cs-title">A cheerful flame flickering above a row of completed day dots, a workout streak milestone</title>
  <style>
    .cs-flame { transform-box: fill-box; transform-origin: 50% 90%; animation: cs-flicker 1.6s ease-in-out infinite; }
    .cs-inner { transform-box: fill-box; transform-origin: 50% 95%; animation: cs-flicker 1.1s ease-in-out infinite reverse; }
    .cs-glow { transform-box: fill-box; transform-origin: center; animation: cs-pulse 2.2s ease-in-out infinite; }
    .cs-spark { transform-box: fill-box; transform-origin: center; animation: cs-twinkle 1.9s ease-in-out infinite; }
    .cs-dot { transform-box: fill-box; transform-origin: center; animation: cs-pop 3.4s ease-in-out infinite; }
    .cs-d2 { animation-delay: .15s; } .cs-d3 { animation-delay: .3s; } .cs-d4 { animation-delay: .45s; } .cs-d5 { animation-delay: .6s; }
    @keyframes cs-flicker { 0%,100% { transform: scaleY(1) scaleX(1); } 50% { transform: scaleY(1.06) scaleX(0.97); } }
    @keyframes cs-pulse { 0%,100% { transform: scale(1); opacity: .18; } 50% { transform: scale(1.08); opacity: .26; } }
    @keyframes cs-twinkle { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(.5); opacity: .4; } }
    @keyframes cs-pop { 0%,88%,100% { transform: scale(1); } 92% { transform: scale(1.18); } 96% { transform: scale(.95); } }
    @media (prefers-reduced-motion: reduce) { .cs-flame, .cs-inner, .cs-glow, .cs-spark, .cs-dot { animation: none; } }
  </style>
  <!-- glow -->
  <circle class="cs-glow" cx="200" cy="128" r="86" fill="#E8B849" opacity="0.18"/>
  <!-- outer flame -->
  <path class="cs-flame" d="M200 44 c6 26 34 38 34 74 a34 34 0 0 1 -68 0 c0 -20 12 -28 18 -44 c6 8 10 14 10 22 c8 -14 8 -36 6 -52 z" fill="#D4654A"/>
  <!-- inner flame -->
  <path class="cs-inner" d="M200 96 c4 14 18 20 18 38 a18 18 0 0 1 -36 0 c0 -10 6 -15 9 -23 c4 4 6 8 6 12 c4 -8 4 -18 3 -27 z" fill="#E8B849"/>
  <!-- happy face -->
  <g>
    <circle cx="192" cy="138" r="2.4" fill="#1E2A32"/>
    <circle cx="208" cy="138" r="2.4" fill="#1E2A32"/>
    <path d="M193 147 q7 6 14 0" fill="none" stroke="#1E2A32" stroke-width="2.6" stroke-linecap="round"/>
  </g>
  <!-- day dots row -->
  <g>
    <g fill="var(--primary, #2E837B)">
      <circle class="cs-dot" cx="128" cy="216" r="12"/>
      <circle class="cs-dot cs-d2" cx="164" cy="216" r="12"/>
      <circle class="cs-dot cs-d3" cx="200" cy="216" r="12"/>
      <circle class="cs-dot cs-d4" cx="236" cy="216" r="12"/>
    </g>
    <g stroke="#FFFFFF" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M122.5 216 l4 4 7 -8"/>
      <path d="M158.5 216 l4 4 7 -8"/>
      <path d="M194.5 216 l4 4 7 -8"/>
      <path d="M230.5 216 l4 4 7 -8"/>
    </g>
    <circle class="cs-dot cs-d5" cx="272" cy="216" r="12" fill="#E8B849"/>
    <path d="M272 208 c1.5 4 6 5 6 10 a6 6 0 0 1 -12 0 c0 -3.5 2.5 -4.5 3.5 -7 c1 1.2 1.7 2.2 2.5 -3 z" fill="#D4654A"/>
  </g>
  <!-- milestone chip -->
  <rect x="160" y="244" width="80" height="26" rx="13" fill="var(--foreground, #1E2A32)"/>
  <text x="200" y="262" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="800" text-anchor="middle" fill="#E8B849">7 DAYS</text>
  <!-- sparks -->
  <path class="cs-spark" d="M136 76 l3 7 7 3 -7 3 -3 7 -3 -7 -7 -3 7 -3 z" fill="#E8B849"/>
  <circle class="cs-spark" cx="272" cy="72" r="4" fill="#D4654A" opacity="0.8"/>
  <circle cx="112" cy="150" r="3" fill="var(--primary, #2E837B)" opacity="0.6"/>
</svg>
