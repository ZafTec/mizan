<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 480" role="img" aria-labelledby="mbw-title">
  <title id="mbw-title">Wide landing banner: Plan it. Lift it. Log it. Share it. Workout tracking in Mizan.</title>
  <defs>
    <linearGradient id="mbw-bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#151D23"/>
      <stop offset="0.7" stop-color="#1E2A32"/>
      <stop offset="1" stop-color="#163B37"/>
    </linearGradient>
    <linearGradient id="mbw-teal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4DCFC4"/>
      <stop offset="1" stop-color="#2E837B"/>
    </linearGradient>
  </defs>
  <rect width="1440" height="480" fill="url(#mbw-bg)"/>
  <!-- ghost chart line across the banner -->
  <path d="M0 420 C 300 400, 520 330, 760 300 S 1200 220, 1440 140" fill="none" stroke="#2E837B" stroke-width="4" opacity="0.35" stroke-dasharray="2 16" stroke-linecap="round"/>
  <!-- headline -->
  <text x="96" y="200" font-family="ui-sans-serif, system-ui, 'Segoe UI', sans-serif" font-size="64" font-weight="900" fill="#F0F4F6">Plan it. Lift it.</text>
  <text x="96" y="272" font-family="ui-sans-serif, system-ui, 'Segoe UI', sans-serif" font-size="64" font-weight="900" fill="#4DCFC4">Log it. Share it.</text>
  <text x="96" y="330" font-family="ui-sans-serif, system-ui, 'Segoe UI', sans-serif" font-size="26" font-weight="600" fill="#9FB8C2">Per-set logging, rest timers, PRs, and a private feed.</text>
  <!-- CTA -->
  <rect x="96" y="366" width="270" height="62" rx="31" fill="url(#mbw-teal)"/>
  <text x="231" y="406" text-anchor="middle" font-family="ui-sans-serif, system-ui, 'Segoe UI', sans-serif" font-size="26" font-weight="800" fill="#0F171C">Start lifting</text>
  <!-- right-side vignette: phone + trophy + flame -->
  <g transform="translate(940 70)">
    <!-- phone -->
    <rect x="0" y="0" width="190" height="340" rx="28" fill="#0F171C"/>
    <rect x="10" y="10" width="170" height="320" rx="20" fill="#243440"/>
    <rect x="28" y="40" width="96" height="12" rx="6" fill="#F0F4F6" opacity="0.9"/>
    <g>
      <circle cx="48" cy="92" r="15" fill="#4DCFC4"/>
      <text x="48" y="97" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="800" fill="#0F171C">5</text>
      <circle cx="86" cy="92" r="15" fill="#4DCFC4"/>
      <text x="86" y="97" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="800" fill="#0F171C">5</text>
      <circle cx="124" cy="92" r="15" fill="#E8B849"/>
      <text x="124" y="97" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="800" fill="#0F171C">3</text>
      <circle cx="158" cy="92" r="13" fill="none" stroke="#64828F" stroke-width="2.5" stroke-dasharray="4 3"/>
    </g>
    <rect x="28" y="128" width="80" height="22" rx="11" fill="#1E2A32"/>
    <text x="68" y="143" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" fill="#8FE0D8">60 kg</text>
    <rect x="116" y="128" width="56" height="22" rx="11" fill="#E8B849"/>
    <text x="144" y="143" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" fill="#151D23">+2.5</text>
    <rect x="28" y="170" width="144" height="10" rx="5" fill="#1E2A32"/>
    <rect x="28" y="170" width="92" height="10" rx="5" fill="#4DCFC4"/>
    <rect x="28" y="200" width="144" height="44" rx="14" fill="#151D23"/>
    <circle cx="52" cy="222" r="11" fill="none" stroke="#E8B849" stroke-width="3.5" stroke-dasharray="48 21" transform="rotate(-90 52 222)"/>
    <text x="118" y="228" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700" fill="#F0F4F6">Rest 1:30</text>
    <rect x="28" y="262" width="144" height="48" rx="14" fill="#2E837B"/>
    <text x="100" y="292" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="800" fill="#FFFFFF">Finish workout</text>
  </g>
  <!-- trophy -->
  <g transform="translate(1210 210)">
    <path d="M-42 -54h84v42a42 42 0 0 1-84 0z" fill="#E8B849"/>
    <path d="M-42 -46h-19a4 4 0 0 0-4 4c0 21 11 32 27 35" fill="none" stroke="#C09539" stroke-width="8" stroke-linecap="round"/>
    <path d="M42 -46h19a4 4 0 0 1 4 4c0 21-11 32-27 35" fill="none" stroke="#C09539" stroke-width="8" stroke-linecap="round"/>
    <rect x="-8" y="28" width="16" height="24" fill="#C09539"/>
    <rect x="-32" y="52" width="64" height="14" rx="5" fill="#C09539"/>
    <rect x="-42" y="66" width="84" height="14" rx="6" fill="#0F171C"/>
    <rect x="-26" y="-30" width="52" height="7" rx="3.5" fill="#151D23"/>
    <rect x="-22" y="-38" width="8" height="23" rx="3" fill="#151D23"/>
    <rect x="14" y="-38" width="8" height="23" rx="3" fill="#151D23"/>
  </g>
  <!-- flame -->
  <g transform="translate(1330 120)">
    <path d="M0 -34c5 17 24 26 24 50a24 24 0 0 1-48 0c0-14 8-19 12-30 4 5 7 10 7 15 5-9 6-24 5-35z" fill="#D4654A"/>
    <path d="M0 4c3 9 12 13 12 24a12 12 0 0 1-24 0c0-7 4-10 6-15 2 3 4 5 4 8 3-5 3-11 2-17z" fill="#E8B849"/>
  </g>
  <!-- confetti -->
  <rect x="880" y="50" width="18" height="18" rx="4" fill="#D4654A" transform="rotate(22 889 59)"/>
  <circle cx="1394" cy="60" r="8" fill="#E8B849"/>
  <path d="M860 420l6 14 14 6-14 6-6 14-6-14-14-6 14-6z" fill="#4DCFC4" opacity="0.85"/>
</svg>
