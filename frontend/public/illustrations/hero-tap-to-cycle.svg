<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" role="img" aria-labelledby="httc-title">
  <title id="httc-title">A phone showing set circles being tapped to log reps, with a rest timer bar below</title>
  <style>
    .httc-ripple { transform-box: fill-box; transform-origin: center; animation: httc-ripple 1.8s ease-out infinite; }
    .httc-hand { animation: httc-tap 1.8s ease-in-out infinite; }
    @keyframes httc-ripple { 0% { transform: scale(.7); opacity: .8; } 70% { transform: scale(1.25); opacity: 0; } 100% { opacity: 0; } }
    @keyframes httc-tap { 0%,100% { transform: translate(0,0); } 12% { transform: translate(-6px,-5px); } 24% { transform: translate(0,0); } }
    @media (prefers-reduced-motion: reduce) { .httc-ripple, .httc-hand { animation: none; } }
  </style>
  <circle cx="240" cy="160" r="120" fill="var(--secondary, #DDE7EB)" opacity="0.45"/>
  <!-- phone -->
  <rect x="150" y="26" width="180" height="268" rx="26" fill="var(--foreground, #1E2A32)"/>
  <rect x="158" y="34" width="164" height="252" rx="20" fill="var(--card, #FFFFFF)"/>
  <rect x="208" y="42" width="64" height="8" rx="4" fill="var(--foreground, #1E2A32)" opacity="0.85"/>
  <!-- exercise header -->
  <rect x="174" y="66" width="98" height="11" rx="5.5" fill="var(--foreground, #1E2A32)" opacity="0.85"/>
  <rect x="174" y="84" width="60" height="8" rx="4" fill="var(--muted-foreground, #64828F)" opacity="0.5"/>
  <!-- set circles row 1: done, done, tapping, pending -->
  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="800" text-anchor="middle">
    <circle cx="190" cy="122" r="14" fill="var(--primary, #2E837B)"/>
    <text x="190" y="127" fill="#FFFFFF">5</text>
    <circle cx="226" cy="122" r="14" fill="var(--primary, #2E837B)"/>
    <text x="226" y="127" fill="#FFFFFF">5</text>
    <!-- tap ripple -->
    <circle class="httc-ripple" cx="262" cy="122" r="20" fill="none" stroke="#E8B849" stroke-width="2.5" opacity="0.6"/>
    <circle cx="262" cy="122" r="14" fill="#E8B849"/>
    <text x="262" y="127" fill="#1E2A32">4</text>
    <circle cx="298" cy="122" r="14" fill="none" stroke="var(--muted-foreground, #64828F)" stroke-width="2.4" stroke-dasharray="4 3"/>
  </g>
  <!-- weight row -->
  <rect x="174" y="148" width="72" height="20" rx="10" fill="var(--secondary, #DDE7EB)"/>
  <text x="210" y="162" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="var(--foreground, #1E2A32)">60 kg</text>
  <rect x="252" y="148" width="60" height="20" rx="10" fill="#E8B849" opacity="0.9"/>
  <text x="282" y="162" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="700" text-anchor="middle" fill="#1E2A32">+2.5</text>
  <!-- second exercise, faded -->
  <rect x="174" y="186" width="84" height="10" rx="5" fill="var(--muted-foreground, #64828F)" opacity="0.45"/>
  <g fill="none" stroke="var(--muted-foreground, #64828F)" stroke-width="2.2" stroke-dasharray="4 3" opacity="0.7">
    <circle cx="190" cy="216" r="12"/>
    <circle cx="220" cy="216" r="12"/>
    <circle cx="250" cy="216" r="12"/>
  </g>
  <!-- rest timer sticky bar -->
  <rect x="170" y="244" width="140" height="30" rx="15" fill="var(--foreground, #1E2A32)"/>
  <circle cx="188" cy="259" r="9" fill="none" stroke="#E8B849" stroke-width="3" stroke-dasharray="40 17" transform="rotate(-90 188 259)"/>
  <text x="248" y="264" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#FFFFFF">Rest 1:30</text>
  <!-- tapping hand -->
  <g class="httc-hand" transform="rotate(-14 340 150)">
    <path d="M330 128 a8 8 0 0 1 16 0 v26 h6 a10 10 0 0 1 10 10 v14 a26 26 0 0 1 -26 26 h-4 a26 26 0 0 1 -26 -26 v-24 h8 v-8 z" fill="#E8B849"/>
    <path d="M330 128 a8 8 0 0 1 16 0 v20 h-16 z" fill="#C09539" opacity="0.5"/>
  </g>
  <!-- sparkles -->
  <path d="M110 90 l3.5 8 8 3.5 -8 3.5 -3.5 8 -3.5 -8 -8 -3.5 8 -3.5 z" fill="#E8B849"/>
  <circle cx="96" cy="212" r="4" fill="#D4654A" opacity="0.7"/>
  <circle cx="392" cy="246" r="3.5" fill="var(--primary, #2E837B)" opacity="0.6"/>
</svg>
