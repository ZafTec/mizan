<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-labelledby="ew-title">
  <title id="ew-title">A barbell taking a nap on the floor, waiting for its first workout</title>
  <style>
    .ew-zzz text { animation: ew-float 3s ease-in-out infinite; }
    .ew-zzz text:nth-child(2) { animation-delay: .4s; }
    .ew-zzz text:nth-child(3) { animation-delay: .8s; }
    .ew-spark { transform-box: fill-box; transform-origin: center; animation: ew-twinkle 2.6s ease-in-out infinite; }
    @keyframes ew-float { 0%,100% { transform: translateY(0); opacity: 1; } 50% { transform: translateY(-6px); opacity: .55; } }
    @keyframes ew-twinkle { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(.55); opacity: .45; } }
    @media (prefers-reduced-motion: reduce) { .ew-zzz text, .ew-spark { animation: none; } }
  </style>
  <!-- floor shadow -->
  <ellipse cx="200" cy="238" rx="130" ry="12" fill="var(--secondary, #DDE7EB)"/>
  <!-- backdrop arc -->
  <circle cx="200" cy="150" r="105" fill="var(--secondary, #DDE7EB)" opacity="0.45"/>
  <!-- bar -->
  <rect x="62" y="196" width="276" height="12" rx="6" fill="var(--muted-foreground, #64828F)"/>
  <!-- collars -->
  <rect x="142" y="190" width="10" height="24" rx="4" fill="var(--foreground, #1E2A32)" opacity="0.55"/>
  <rect x="248" y="190" width="10" height="24" rx="4" fill="var(--foreground, #1E2A32)" opacity="0.55"/>
  <!-- outer plates (gold) -->
  <rect x="90" y="172" width="18" height="60" rx="7" fill="#E8B849"/>
  <rect x="292" y="172" width="18" height="60" rx="7" fill="#E8B849"/>
  <!-- inner plates (brand) -->
  <rect x="110" y="156" width="26" height="92" rx="10" fill="var(--primary, #2E837B)"/>
  <rect x="264" y="156" width="26" height="92" rx="10" fill="var(--primary, #2E837B)"/>
  <!-- sleeping face on the right inner plate -->
  <g stroke="var(--background, #F0F4F6)" stroke-width="2.5" stroke-linecap="round" fill="none">
    <path d="M271 192 q3 3 6 0"/>
    <path d="M281 192 q3 3 6 0"/>
    <path d="M275 203 q3 2 6 0"/>
  </g>
  <!-- zzz -->
  <g class="ew-zzz" fill="var(--muted-foreground, #64828F)" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="700">
    <text x="304" y="146" font-size="18">z</text>
    <text x="318" y="130" font-size="14">z</text>
    <text x="329" y="117" font-size="11">z</text>
  </g>
  <!-- sparkle + dust -->
  <path class="ew-spark" d="M84 108 l4 10 10 4 -10 4 -4 10 -4 -10 -10 -4 10 -4 z" fill="#E8B849"/>
  <circle cx="120" cy="92" r="3.5" fill="var(--primary, #2E837B)" opacity="0.6"/>
  <circle cx="66" cy="140" r="2.5" fill="#D4654A" opacity="0.7"/>
  <circle cx="330" cy="86" r="3" fill="var(--primary, #2E837B)" opacity="0.45"/>
</svg>
