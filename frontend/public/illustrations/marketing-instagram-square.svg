<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" role="img" aria-labelledby="igs-title">
  <title id="igs-title">Instagram square: Log the lift. Share the win. Mizan workout tracking announcement.</title>
  <defs>
    <linearGradient id="igs-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1E2A32"/>
      <stop offset="1" stop-color="#12262B"/>
    </linearGradient>
    <linearGradient id="igs-teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4DCFC4"/>
      <stop offset="1" stop-color="#2E837B"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#igs-bg)"/>
  <!-- halo -->
  <circle cx="540" cy="470" r="300" fill="#4DCFC4" opacity="0.08"/>
  <circle cx="540" cy="470" r="220" fill="#4DCFC4" opacity="0.08"/>
  <!-- trophy centerpiece -->
  <g transform="translate(540 430)">
    <path d="M-110 -140h220v110a110 110 0 0 1-220 0z" fill="#E8B849"/>
    <path d="M-110 -120h-50a10 10 0 0 0-10 10c0 55 30 85 70 92" fill="none" stroke="#C09539" stroke-width="20" stroke-linecap="round"/>
    <path d="M110 -120h50a10 10 0 0 1 10 10c0 55-30 85-70 92" fill="none" stroke="#C09539" stroke-width="20" stroke-linecap="round"/>
    <path d="M-90 -125c0 65 15 110 35 130" fill="none" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round" opacity="0.4"/>
    <rect x="-20" y="70" width="40" height="60" fill="#C09539"/>
    <rect x="-80" y="130" width="160" height="34" rx="12" fill="#C09539"/>
    <rect x="-110" y="164" width="220" height="38" rx="14" fill="#0F171C"/>
    <!-- barbell emblem -->
    <rect x="-70" y="-60" width="140" height="16" rx="8" fill="#151D23"/>
    <rect x="-60" y="-80" width="20" height="56" rx="8" fill="#151D23"/>
    <rect x="40" y="-80" width="20" height="56" rx="8" fill="#151D23"/>
  </g>
  <!-- confetti -->
  <g>
    <rect x="250" y="200" width="26" height="26" rx="6" fill="#D4654A" transform="rotate(24 263 213)"/>
    <rect x="800" y="240" width="24" height="24" rx="6" fill="#4DCFC4" transform="rotate(-20 812 252)"/>
    <rect x="220" y="620" width="22" height="22" rx="5" fill="#E8B849" transform="rotate(40 231 631)"/>
    <rect x="830" y="600" width="22" height="22" rx="5" fill="#D4654A" transform="rotate(-32 841 611)"/>
    <circle cx="320" cy="420" r="10" fill="#4DCFC4"/>
    <circle cx="780" cy="440" r="10" fill="#E8B849"/>
    <path d="M540 130l9 20 20 9-20 9-9 20-9-20-20-9 20-9z" fill="#F0F4F6"/>
  </g>
  <!-- headline -->
  <text x="540" y="782" text-anchor="middle" font-family="ui-sans-serif, system-ui, 'Segoe UI', sans-serif" font-size="72" font-weight="900" fill="#F0F4F6">Log the lift.</text>
  <text x="540" y="862" text-anchor="middle" font-family="ui-sans-serif, system-ui, 'Segoe UI', sans-serif" font-size="72" font-weight="900" fill="#4DCFC4">Share the win.</text>
  <!-- sub -->
  <text x="540" y="924" text-anchor="middle" font-family="ui-sans-serif, system-ui, 'Segoe UI', sans-serif" font-size="30" font-weight="600" fill="#9FB8C2">Workout tracking is now in Mizan</text>
  <!-- brand footer -->
  <g transform="translate(540 990)">
    <circle cx="-118" cy="-10" r="20" fill="url(#igs-teal)"/>
    <path d="M-127 -10h18M-125 -16v12M-107 -16v12" stroke="#151D23" stroke-width="4" stroke-linecap="round"/>
    <text x="-88" y="0" font-family="ui-sans-serif, system-ui, 'Segoe UI', sans-serif" font-size="28" font-weight="800" fill="#F0F4F6" letter-spacing="1">MIZAN</text>
    <text x="128" y="0" text-anchor="end" font-family="ui-sans-serif, system-ui, 'Segoe UI', sans-serif" font-size="24" font-weight="600" fill="#64828F"> </text>
  </g>
</svg>
